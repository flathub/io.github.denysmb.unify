name: Release Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release from GitHub API
        id: latest_release
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/DenysMb/Unify/releases/latest)
          LATEST_TAG=$(echo "$RESPONSE" | jq -r '.tag_name')

          # Get the commit SHA for the tag
          LATEST_COMMIT=$(curl -s https://api.github.com/repos/DenysMb/Unify/git/refs/tags/$LATEST_TAG | jq -r '.object.sha')

          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "latest_commit=$LATEST_COMMIT" >> $GITHUB_OUTPUT

          echo "Latest release: $LATEST_TAG"
          echo "Commit: $LATEST_COMMIT"

      - name: Get current version from manifest
        id: current_version
        run: |
          CURRENT_TAG=$(jq -r '.modules[0].sources[0].tag' io.github.denysmb.unify.json)
          CURRENT_COMMIT=$(jq -r '.modules[0].sources[0].commit' io.github.denysmb.unify.json)

          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT

          echo "Current release: $CURRENT_TAG"
          echo "Current commit: $CURRENT_COMMIT"

      - name: Check if update needed
        id: check_update
        run: |
          if [ "${{ steps.latest_release.outputs.latest_tag }}" != "${{ steps.current_version.outputs.current_tag }}" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update manifest
        if: steps.check_update.outputs.needs_update == 'true'
        run: |
          NEW_TAG="${{ steps.latest_release.outputs.latest_tag }}"
          NEW_COMMIT="${{ steps.latest_release.outputs.latest_commit }}"

          jq --arg tag "$NEW_TAG" --arg commit "$NEW_COMMIT" \
            '.modules[0].sources[0].tag = $tag | .modules[0].sources[0].commit = $commit' \
            io.github.denysmb.unify.json > io.github.denysmb.unify.json.tmp

          mv io.github.denysmb.unify.json.tmp io.github.denysmb.unify.json

          echo "Updated manifest to version $NEW_TAG (commit: $NEW_COMMIT)"

      - name: Create Pull Request
        if: steps.check_update.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: release ${{ steps.latest_release.outputs.latest_tag }}

            Update to latest release from DenysMb/Unify
          branch: chore/release-${{ steps.latest_release.outputs.latest_tag }}
          delete-branch: true
          title: "chore: release ${{ steps.latest_release.outputs.latest_tag }}"
          body: |
            ## Summary
            - New release detected: ${{ steps.latest_release.outputs.latest_tag }}
            - Commit hash: ${{ steps.latest_release.outputs.latest_commit }}
            - Previous version: ${{ steps.current_version.outputs.current_tag }}

            ## Changes
            - Updated `tag` in io.github.denysmb.unify.json
            - Updated `commit` hash to match new release

            This PR was automatically generated by the release monitor workflow.
          labels: |
            automated pr
            dependencies
